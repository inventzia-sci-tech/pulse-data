name: DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by on every commit in the PR
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -e
          missing=0
          for sha in $(git rev-list "$BASE_SHA".."$HEAD_SHA"); do
            if ! git log -1 --format=%B "$sha" | grep -qE '^Signed-off-by: .+ <.+@.+>$'; then
              author=$(git log -1 --format='%an <%ae>' "$sha")
              subject=$(git log -1 --format='%s' "$sha")
              echo "::error::Commit $sha by $author is missing Signed-off-by: $subject"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing commit(s) missing DCO sign-off. Run 'git commit --amend -s' (single commit) or 'git rebase -i --signoff <base>' (multiple)."
            exit 1
          fi
          echo "All commits have a Signed-off-by line."
