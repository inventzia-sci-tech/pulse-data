# Base layer of the shared `pulse` conda environment.
#
# This is the minimal set pulse-data needs on its own: the schema generators and
# the generated Pydantic models. No pipeline/storage/airflow dependencies — those
# live in pulse-utils. Working only with pulse-data? This file is all you need.
#
# Working across the stack (pulse-beacon, the cross-language bridge)? Create this
# env, then enrich the SAME `pulse` env with pulse-beacon's extra requirements:
#   conda env create -f pulse-data/py_environment.yml
#   conda env update -f pulse-beacon/core/python/py_environment.yml


name: pulse
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      - pyyaml                      # read YAML schemas in the generators
      - datamodel-code-generator    # (optional) alt Pydantic generation
      - pydantic                    # import/validate the generated models
