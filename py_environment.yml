# Minimal environment for pulse-data: just the schema generators and the
# generated Pydantic models. No pipeline/storage/airflow dependencies — those
# live in pulse-utils.
#
# Usage (from this folder):
#   conda env create -f py_environment.yml
#   conda activate pulse-data


name: pulse-data
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      - pyyaml                      # read YAML schemas in the generators
      - datamodel-code-generator    # (optional) alt Pydantic generation
      - pydantic                    # import/validate the generated models
